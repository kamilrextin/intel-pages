name: Validate Intel Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check manifest sync
        run: |
          echo "Checking for untracked pages..."
          node scripts/sync-manifest.js

      - name: Validate all pages exist locally
        run: |
          echo "Validating all manifest pages have local files..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            const manifest = JSON.parse(fs.readFileSync('pages-manifest.json', 'utf-8'));
            let missing = [];
            for (const cat of Object.values(manifest.categories)) {
              for (const page of cat.pages) {
                const slug = page.replace(/^\\/|\\/$/g, '');
                const indexPath = path.join(slug, 'index.html');
                if (!fs.existsSync(indexPath) && !fs.existsSync(slug + '.html')) {
                  missing.push(page);
                }
              }
            }
            if (missing.length > 0) {
              console.error('Missing pages:');
              missing.forEach(p => console.error('  ' + p));
              process.exit(1);
            }
            console.log('All manifest pages exist locally');
          "
